<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dino Runner</title>
<style>
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,sans-serif;background:#f7f7f7;}
  .wrap{display:flex;align-items:center;justify-content:center;height:100%;}
  canvas{width:900px;max-width:100%;height:300px;display:block;border:1px solid rgba(0,0,0,0.06);box-shadow:0 10px 30px rgba(2,6,23,0.15);touch-action:none;}
  .hint{position:fixed;left:16px;top:16px;color:#444;font-size:13px;}
  .small{font-size:12px;color:#666;margin-top:6px;}

  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9;}
  #videoContainer{
    display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:10;width:80%;max-width:600px;border:3px solid white;border-radius:12px;
    overflow:hidden;background:#000;box-shadow:0 0 25px rgba(0,0,0,0.6);
  }
  #gameOverVideo{width:100%;display:block;pointer-events:none;}
  #skipBtn{
    position:absolute;bottom:20px;right:20px;padding:12px 24px;
    background:rgba(255,255,255,0.9);color:#222;border:none;border-radius:6px;
    font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;z-index:11;
    transition:all 0.2s ease;
  }
  #skipBtn:hover{background:#fff;transform:scale(1.05);}
  #skipBtn:active{transform:scale(0.95);}
</style>
</head>
<body>
<div class="hint">
  Space / Up: jump &middot; Down: duck &middot; Tap to jump
  <div class="small">High score auto-saved.</div>
</div>
<div class="wrap">
  <canvas id="c" width="900" height="300"></canvas>
</div>

<div id="overlay"></div>
<div id="videoContainer">
  <video id="gameOverVideo" playsinline>
    <source src="sad.mp4" type="video/mp4">
  </video>
  <button id="skipBtn">Skip →</button>
</div>

<script>
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const overlay  = document.getElementById('overlay');
const videoCon = document.getElementById('videoContainer');
const vid      = document.getElementById('gameOverVideo');
const skipBtn  = document.getElementById('skipBtn');

// ── Single source of truth for video visibility ──────────────────────────────
let videoVisible = false;

let W = canvas.width, H = canvas.height;
let running = false, gameOver = false;
let speed, distance, spawnTimer, tick;
let obstacles, clouds, score;
let highscore = 0, daytime = true;
let last = performance.now();

try { highscore = Number(localStorage.getItem('dino_hi') || 0); } catch(e){}

const dino = {
  x:80, y:0, w:44, h:44, vy:0,
  gravity:1700, jumpPower:520,
  grounded:true, ducking:false, duckHeight:28
};
const keys = {};

// ── Audio ─────────────────────────────────────────────────────────────────────
const aCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(f,d){
  if(aCtx.state==='suspended') aCtx.resume();
  const o=aCtx.createOscillator(), g=aCtx.createGain();
  o.connect(g); g.connect(aCtx.destination);
  o.type='sine'; o.frequency.value=f; g.gain.value=0.05;
  o.start(); o.stop(aCtx.currentTime+d);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function rand(a,b){ return Math.random()*(b-a)+a; }
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

// ── Video ─────────────────────────────────────────────────────────────────────
function showVideo(){
  videoVisible = true;
  overlay.style.display  = 'block';
  videoCon.style.display = 'block';
  vid.currentTime = 0;
  vid.muted = false;
  const p = vid.play();
  if(p) p.catch(()=>{ vid.muted=true; vid.play(); });
}

function closeVideo(){
  videoVisible = false;
  vid.pause();
  vid.currentTime = 0;
  overlay.style.display  = 'none';
  videoCon.style.display = 'none';
  drawGameOver();   // show the game-over canvas screen after closing
}

skipBtn.addEventListener('click', closeVideo);

// ── Input — ONE handler for everything ───────────────────────────────────────
function handleAction(){
  if(videoVisible) return;              // video showing → ignore
  if(gameOver){ startGame(); return; }  // game-over screen → restart
  if(!running){ startGame(); return; }  // title screen → start
  // playing → jump
  if(dino.grounded){
    dino.vy = -dino.jumpPower;
    dino.grounded = false;
    beep(1000, 0.03);
  }
}

// Keyboard — Space/Up go through handleAction; duck keys update keys map
window.addEventListener('keydown', e => {
  if(e.key===' ' || e.key==='ArrowUp'){
    e.preventDefault();
    handleAction();
  } else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){
    keys[e.key]=true;
  } else if(e.key==='p'||e.key==='P'){
    if(!videoVisible){
      if(running){ running=false; }
      else if(!gameOver){ running=true; last=performance.now(); requestAnimationFrame(loop); }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key]=false; });

// Touch/click only on canvas — skip button is outside canvas so no conflict
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); handleAction(); },{passive:false});
canvas.addEventListener('mousedown',  ()=>handleAction());

// ── Game start / reset ────────────────────────────────────────────────────────
function startGame(){
  // Forcibly close video in case it's open
  videoVisible=false;
  overlay.style.display=videoCon.style.display='none';
  vid.pause(); vid.currentTime=0;

  obstacles=[]; clouds=[]; score=0; distance=0;
  speed=6; spawnTimer=0; tick=0;
  gameOver=false; running=true;
  dino.y=H-28-dino.h; dino.vy=0; dino.grounded=true; dino.ducking=false;
  daytime=true;

  beep(800,0.03);
  last=performance.now();
  requestAnimationFrame(loop);
}

// ── Death ─────────────────────────────────────────────────────────────────────
function triggerDeath(){
  running=false;
  gameOver=true;
  beep(150,0.12);
  showVideo();   // called every single death, no conditions
}

// ── Spawners ──────────────────────────────────────────────────────────────────
function spawnObstacle(){
  if(Math.random()<0.18 && distance>800){
    const ys=[H-140,H-120,H-170];
    obstacles.push({type:'ptero',x:W+40,y:ys[Math.floor(Math.random()*3)],w:46,h:32,frame:0});
  } else {
    const sz=[{w:20,h:40},{w:28,h:54},{w:40,h:54}];
    const s=sz[Math.floor(Math.random()*3)];
    obstacles.push({type:'cactus',x:W+40,y:H-28-s.h,w:s.w,h:s.h});
  }
}
function spawnCloud(){
  clouds.push({x:W+rand(0,200),y:rand(30,110),w:rand(40,80),spd:rand(0.4,1.2)});
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(now){
  // If stopped for any reason, just draw current state and exit loop
  if(!running){ draw(); return; }

  const dt=Math.min(0.033,(now-last)/1000);
  last=now; tick+=dt*60;

  distance+=speed*dt*60;
  score=Math.floor(distance/6);
  if(score>highscore){ highscore=score; try{localStorage.setItem('dino_hi',highscore);}catch(e){} }
  speed=6+Math.floor(distance/400)*0.5;
  daytime=Math.floor(distance/600)%2===0;

  spawnTimer-=speed*dt*60;
  if(spawnTimer<=0){ spawnObstacle(); spawnTimer=420+rand(-20,40)-Math.min(40,distance/20); }
  if(Math.random()<0.02) spawnCloud();

  clouds.forEach(c=>{ c.x-=c.spd*(speed/6); });
  clouds=clouds.filter(c=>c.x+c.w>-50);

  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];
    if(o.type==='ptero'){ o.frame+=0.2+speed/40; o.x-=speed*(1.2+Math.sin(o.frame)*0.06); }
    else { o.x-=speed; }
    if(o.x+o.w<-40) obstacles.splice(i,1);
  }

  dino.vy+=dino.gravity*dt;
  dino.y+=dino.vy*dt;
  const gY=H-28-dino.h;
  if(dino.y>=gY){ dino.y=gY; dino.vy=0; dino.grounded=true; } else dino.grounded=false;
  dino.ducking=dino.grounded&&!!(keys['ArrowDown']||keys['s']||keys['S']);

  const pr={x:dino.x,y:dino.ducking?dino.y+(dino.h-dino.duckHeight):dino.y,w:dino.w,h:dino.ducking?dino.duckHeight:dino.h};
  for(const o of obstacles){
    if(overlap(pr,{x:o.x,y:o.y,w:o.w,h:o.h})){
      triggerDeath();  // sets running=false, gameOver=true, shows video
      draw();
      return;          // exit loop — startGame() will spawn a new one
    }
  }

  draw();
  requestAnimationFrame(loop);
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function syncCanvas(){
  const dpr=devicePixelRatio||1;
  const cw=Math.floor(canvas.clientWidth*dpr), ch=Math.floor(canvas.clientHeight*dpr);
  if(canvas.width!==cw||canvas.height!==ch){ canvas.width=cw; canvas.height=ch; W=cw; H=ch; }
}

function draw(){
  syncCanvas();
  ctx.fillStyle=daytime?'#f7f7f7':'#0b1220'; ctx.fillRect(0,0,W,H);

  clouds.forEach(c=>{
    ctx.globalAlpha=0.9; ctx.fillStyle=daytime?'#fff':'#2b3b4a';
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.w*.28,0,Math.PI*2);
    ctx.arc(c.x+c.w*.2,c.y-c.w*.08,c.w*.32,0,Math.PI*2);
    ctx.arc(c.x+c.w*.42,c.y,c.w*.22,0,Math.PI*2);
    ctx.fill(); ctx.globalAlpha=1;
  });

  ctx.fillStyle=daytime?'#ddd':'#13202b'; ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle=daytime?'#e1e1e1':'#0f1a24';
  const sw=18, off=Math.floor((distance*.5)%sw);
  for(let x=-off;x<W;x+=sw) ctx.fillRect(x,H-28,sw/2,6);

  obstacles.forEach(o=>{
    if(o.type==='cactus'){
      ctx.fillStyle=daytime?'#006400':'#a3d3a3';
      ctx.fillRect(o.x,o.y+o.h*.3,o.w,o.h*.7);
      ctx.fillRect(o.x-6,o.y+o.h*.45,8,o.h*.12);
      ctx.fillRect(o.x+o.w-2,o.y+o.h*.25,8,o.h*.12);
    } else {
      ctx.fillStyle=daytime?'#6b6b6b':'#d6d6d6';
      const cx=o.x+o.w/2,cy=o.y+o.h/2;
      ctx.beginPath();
      ctx.moveTo(cx-18,cy); ctx.quadraticCurveTo(cx-6,cy-16,cx,cy-8);
      ctx.quadraticCurveTo(cx+8,cy-16,cx+18,cy);
      ctx.lineTo(cx+30,cy+6); ctx.lineTo(cx+10,cy+6);
      ctx.quadraticCurveTo(cx,cy+12,cx-10,cy+6);
      ctx.lineTo(cx-30,cy+6); ctx.closePath(); ctx.fill();
      ctx.fillStyle=daytime?'#fff':'#000'; ctx.fillRect(cx+6,cy-2,4,4);
    }
  });

  ctx.save();
  ctx.fillStyle=daytime?'#222':'#fff';
  const px=dino.x,py=dino.y,pw=dino.w,ph=dino.h;
  if(dino.ducking){
    ctx.fillRect(px,py+(ph-dino.duckHeight),pw,dino.duckHeight);
    ctx.fillStyle=daytime?'#fff':'#000';
    ctx.fillRect(px+pw-14,py+(ph-dino.duckHeight)+6,6,6);
  } else {
    ctx.fillRect(px,py,pw,ph);
    ctx.fillStyle=daytime?'#fff':'#000';
    ctx.fillRect(px+pw-14,py+8,6,6);
    const ly=py+ph-6;
    ctx.fillRect(px+6,ly,8,6);
    ctx.fillRect(px+pw-14,Math.floor(tick/8)%2===0?ly:ly+2,8,4);
  }
  ctx.restore();

  ctx.fillStyle=daytime?'#333':'#dfe7ef';
  ctx.font='600 16px system-ui'; ctx.textAlign='right';
  ctx.fillText('Score: '+score,W-16,28);
  ctx.font='13px system-ui'; ctx.textAlign='left';
  ctx.fillText('High: '+highscore,16,28);

  if(!running&&!gameOver){
    ctx.fillStyle=daytime?'#666':'#cfcfcf';
    ctx.font='16px system-ui'; ctx.textAlign='center';
    ctx.fillText('Press Space / Up or tap to start',W/2,H/2);
  }
  if(gameOver&&!videoVisible) drawGameOver();
}

function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  ctx.font='700 28px system-ui'; ctx.textAlign='center';
  ctx.fillText('Game Over',W/2,H/2-12);
  ctx.font='16px system-ui';
  ctx.fillText('Score: '+score+'   •   High: '+highscore,W/2,H/2+18);
  ctx.font='13px system-ui';
  ctx.fillText('Press Space / Up or tap to play again',W/2,H/2+44);
  ctx.restore();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
dino.y=H-28-dino.h;
for(let i=0;i<3;i++) spawnCloud();
draw();
</script>
</body>
</html>
